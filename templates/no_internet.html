<!DOCTYPE html>
<html>
<head>
<title>No Internet</title>

<style>
body{
    margin:0;
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    background:#f1f3f4;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.container{
    text-align:center;
    max-width:400px;
}

/* Icon circle */
.icon{
    width:90px;
    height:90px;
    border-radius:50%;
    background:#e8eaed;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:40px;
    margin:0 auto 20px;
}

/* Heading */
h1{
    font-size:24px;
    color:#202124;
    margin-bottom:10px;
}

/* Subtext */
p{
    color:#5f6368;
    font-size:14px;
    line-height:1.5;
}

/* Retry button */
button{
    margin-top:20px;
    padding:10px 20px;
    border:none;
    border-radius:20px;
    background:#1a73e8;
    color:white;
    font-size:14px;
    cursor:pointer;
    transition:0.3s;
}

button:hover{
    background:#1558b0;
}

/* Small tips */
.tips{
    margin-top:25px;
    text-align:left;
    font-size:13px;
    color:#5f6368;
}

.tips li{
    margin-bottom:5px;
}
</style>
</head>

<body>

<div class="container">

    <div class="icon">📡</div>

    <h1>No Internet</h1>

    <p>
        Your device is not connected to the internet.<br>
        Please check your connection and try again.
    </p>

    <button onclick="location.reload()">Retry</button>

    <div class="tips">
        <p><b>Try:</b></p>
        <ul>
            <li>Checking your Wi-Fi connection</li>
            <li>Restarting your router</li>
            <li>Turning mobile data on/off</li>
        </ul>
    </div>

</div>

</body>
</html>
