<!DOCTYPE html>
<html>
<head>
<title>Forgot Password</title>

<style>
body{
    font-family: Arial;
    margin:0;
    background: linear-gradient(to right, #4facfe, #43e97b);
}
header{
            background:#2b6cb0;
            color:white;
            padding:15px;
            padding-left:40px;
            font-size:20px;
}
.container{
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.box{
    background:white;
    padding:30px;
    width:350px;
    border-radius:12px;
    box-shadow:0px 5px 15px rgba(0,0,0,0.2);
}

h2{
    text-align:center;
    color:#2b6cb0;
}

input{
    width:100%;
    padding:10px;
    margin:10px 0;
    border-radius:6px;
    border:1px solid #ccc;
}

button{
    width:100%;
    padding:12px;
    background:#2b6cb0;
    color:white;
    border:none;
    border-radius:6px;
    cursor:pointer;
}

button:hover{
    background:#1e4e8c;
}

.alert{
    padding:10px;
    margin-bottom:10px;
    border-radius:6px;
    text-align:center;
    font-weight:bold;
}

.success{ background:#d4edda; color:#155724; }
.error{ background:#f8d7da; color:#721c24; }

a{
    display:block;
    text-align:center;
    margin-top:10px;
    color:#2b6cb0;
    text-decoration:none;
}
</style>
</head>

<body>
    <header>
        <h3>🎓 Student Doubt Resolution Platform</h3>
    </header>

<div class="container">
<div class="box">

<h2>🔐 Forgot Password</h2>

{% with messages = get_flashed_messages(with_categories=true) %}
  {% if messages %}
    {% for category, message in messages %}
      <div class="alert {{category}}">{{message}}</div>
    {% endfor %}
  {% endif %}
{% endwith %}

<form method="POST">

    <!-- Email -->
    <input type="email" name="email" placeholder="Enter your email" required value="{{ email if email }}">

    <!-- Show reset only if email valid -->
    {% if show_reset %}
        <input type="password" name="password" placeholder="New Password" required>
        <input type="password" name="confirm_password" placeholder="Confirm Password" required>
    {% endif %}

    <button type="submit">
        {% if show_reset %}
            🔄 Change Password
        {% else %}
            ➡ Next
        {% endif %}
    </button>

</form>

<a href="/login">⬅ Back to Login</a>

</div>
</div>

</body>
</html>
